<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - AI Avengers</title>

  <!-- ✅ GLOBAL CSS -->
  <link rel="stylesheet" href="style.css">

  <!-- EmailJS -->
  <script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
  <script>
    (function(){
      emailjs.init("9v-ZXfUvYW3w24fqs");
    })();
  </script>

  <!-- 🔥 Page specific -->
  <style>
    .form-container {
      max-width: 600px;
      margin: 40px auto;
    }
  </style>
</head>

<body>

  <!-- HEADER -->
  <header class="container header">
  <a href="./index.html" class="logo-box" aria-label="Go to homepage">
    <img src="assets/logo.png" alt="AI Avengers Logo">
    <div>
      <h1>AI Avengers</h1>
      <p class="tagline">Build that matters.</p>
    </div>
  </a>
</header>
  

  <!-- MAIN -->
  <section class="container">
    <div class="form-container">

      <div class="card">
        <h2>📩 Contact Us</h2>

        <input type="text" id="contactName" placeholder="Your Name" required>
        <input type="email" id="contactEmail" placeholder="Your Email" required>
        <input type="text" id="contactSubject" placeholder="Subject">
        <textarea id="contactMessage" placeholder="Write your message..." required></textarea>

        <button id="contactSubmit">Send Message</button>
        <p id="contactStatus"></p>
      </div>

    </div>
  </section>

  <!-- FOOTER -->
  <footer class="container footer">
    <a href="index.html">Home</a> |
    <a href="terms.html">Terms of Use</a> |
    <a href="feedback.html">Feedback</a>
  </footer>

  <script src="contact.js"></script>
</body>
</html>
